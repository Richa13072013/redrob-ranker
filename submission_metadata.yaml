ai_usage_summary: |
  Used Claude for architecture discussion, code review, debugging, and mentorship
  throughout development. All code was written by the participant, guided step by
  step by Claude. No candidate data was fed to any external LLM API — the ranking
  pipeline runs entirely locally with no network access.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranking system combining structured feature scoring (title match, skill
  evidence cross-checked against career history, experience band, location fit,
  education tier) with a TF-IDF+SVD semantic similarity layer comparing career
  narratives against two "ideal candidate" profiles (production-shipper and
  technical-depth), blended 60/40 toward shipping per the JD's stated preference.
  Honeypot and hard-disqualifier detection suppresses (rather than excludes)
  suspicious or JD-disqualified profiles via a multiplicative penalty, since
  rule-based detection is imperfect and hard exclusion risks false positives.
  A behavioral multiplier from redrob_signals further adjusts scores based on
  availability, engagement, and salary fit. Runtime is ~80 seconds for 100,000
  candidates on a standard CPU laptop, no GPU or network required.

